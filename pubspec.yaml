name: ingazi
description: "Connect ALU students with startup opportunities"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  flutter_riverpod: ^2.6.0
  google_fonts: ^6.2.0
  flutter_svg: ^2.0.10
  fluttertoast: ^8.2.8
  intl: ^0.19.0
  timeago: ^3.7.0
  connectivity_plus: ^6.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true